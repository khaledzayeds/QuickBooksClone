name: ledgerflow
description: "LedgerFlow ERP - Flutter Mobile Client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.2

  # Network
  dio: ^5.9.2

  # Local Settings Storage
  shared_preferences: ^2.5.3

  # Hashing / License helpers
  crypto: ^3.0.6
  cryptography: ^2.7.0

  # Formatting — يتوافق مع flutter_localizations في Dart 3.9
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

  # Fonts
  google_fonts: ^6.2.1
  fl_chart: ^1.2.0

  # Files
  file_picker: ^10.3.7

  # Printing / PDF
  pdf: ^3.11.3
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/fonts/
